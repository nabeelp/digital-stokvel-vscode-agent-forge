name: Mobile CI/CD

on:
  push:
    branches: [ main ]
    paths:
      - 'src/mobile/**'
      - '.github/workflows/mobile-ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'src/mobile/**'

env:
  NODE_VERSION: '20'
  JAVA_VERSION: '17'

jobs:
  lint-and-test:
    name: Lint, Type Check & Test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: src/mobile/package-lock.json
    
    - name: Install dependencies
      run: npm ci
      working-directory: ./src/mobile
    
    - name: Run ESLint
      run: npm run lint
      working-directory: ./src/mobile
    
    - name: TypeScript type check
      run: npx tsc --noEmit
      working-directory: ./src/mobile
    
    - name: Run Jest tests with coverage
      run: npm test -- --coverage --coverageReporters=text --coverageReporters=lcov
      working-directory: ./src/mobile
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      if: always()
      with:
        files: ./src/mobile/coverage/lcov.info
        flags: mobile
        name: mobile-coverage
        fail_ci_if_error: false
    
    - name: Check test coverage threshold
      run: |
        COVERAGE=$(npx nyc report --reporter=text-summary | grep "Lines" | awk '{print $3}' | sed 's/%//')
        echo "Test Coverage: $COVERAGE%"
        if (( $(echo "$COVERAGE < 70" | bc -l) )); then
          echo "::error::Test coverage ($COVERAGE%) is below 70% threshold"
          exit 1
        fi
      working-directory: ./src/mobile
      if: github.event_name == 'pull_request'

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: src/mobile/package-lock.json
    
    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: ${{ env.JAVA_VERSION }}
    
    - name: Install dependencies
      run: npm ci
      working-directory: ./src/mobile
    
    - name: Make gradlew executable
      run: chmod +x ./gradlew
      working-directory: ./src/mobile/android
    
    - name: Build Android APK (Debug)
      if: github.event_name == 'pull_request'
      run: ./gradlew assembleDebug
      working-directory: ./src/mobile/android
    
    - name: Decode keystore (Release)
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      env:
        ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      run: |
        if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/release.keystore
        else
          echo "::warning::No keystore found, building unsigned release APK"
        fi
      working-directory: ./src/mobile
    
    - name: Build Android APK (Release)
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: |
        if [ -f "./app/release.keystore" ]; then
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/app/release.keystore \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD
        else
          ./gradlew assembleRelease
        fi
      working-directory: ./src/mobile/android
    
    - name: Upload Android APK
      uses: actions/upload-artifact@v4
      with:
        name: android-apk-${{ github.event_name == 'pull_request' && 'debug' || 'release' }}
        path: |
          src/mobile/android/app/build/outputs/apk/debug/*.apk
          src/mobile/android/app/build/outputs/apk/release/*.apk
        retention-days: 7
    
    - name: Generate APK metadata
      if: github.ref == 'refs/heads/main'
      run: |
        echo "## 📱 Android Build" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Build Type**: Release" >> $GITHUB_STEP_SUMMARY
        echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY

  build-ios:
    name: Build iOS
    runs-on: macos-14
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: src/mobile/package-lock.json
    
    - name: Install dependencies
      run: npm ci
      working-directory: ./src/mobile
    
    - name: Install CocoaPods
      run: |
        cd ios
        pod install
      working-directory: ./src/mobile
    
    - name: Configure signing
      if: env.IOS_CERTIFICATE != ''
      env:
        IOS_CERTIFICATE: ${{ secrets.IOS_CERTIFICATE }}
        IOS_PROVISIONING_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE }}
        IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
      run: |
        if [ -n "$IOS_CERTIFICATE" ]; then
          echo "Configuring iOS signing..."
          # Create keychain
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          
          # Import certificate
          echo "$IOS_CERTIFICATE" | base64 -d > certificate.p12
          security import certificate.p12 -k build.keychain -P "$IOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
          
          # Import provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$IOS_PROVISIONING_PROFILE" | base64 -d > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision
        else
          echo "::warning::No iOS signing credentials found, skipping iOS build"
          exit 0
        fi
    
    - name: Build iOS IPA
      if: env.IOS_CERTIFICATE != ''
      env:
        IOS_CERTIFICATE: ${{ secrets.IOS_CERTIFICATE }}
      run: |
        if [ -n "$IOS_CERTIFICATE" ]; then
          xcodebuild -workspace DigitalStokvel.xcworkspace \
            -scheme DigitalStokvel \
            -configuration Release \
            -archivePath ./build/DigitalStokvel.xcarchive \
            clean archive
          
          xcodebuild -exportArchive \
            -archivePath ./build/DigitalStokvel.xcarchive \
            -exportPath ./build \
            -exportOptionsPlist ./exportOptions.plist
        fi
      working-directory: ./src/mobile/ios
    
    - name: Upload iOS IPA
      if: env.IOS_CERTIFICATE != ''
      env:
        IOS_CERTIFICATE: ${{ secrets.IOS_CERTIFICATE }}
      uses: actions/upload-artifact@v4
      with:
        name: ios-ipa
        path: src/mobile/ios/build/*.ipa
        retention-days: 7
    
    - name: Generate IPA metadata
      if: env.IOS_CERTIFICATE != ''
      env:
        IOS_CERTIFICATE: ${{ secrets.IOS_CERTIFICATE }}
      run: |
        if [ -n "$IOS_CERTIFICATE" ]; then
          echo "## 📱 iOS Build" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Type**: Release" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
        fi

  distribute:
    name: Distribute to App Center
    runs-on: ubuntu-latest
    needs: [build-android, build-ios]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - name: Download Android APK
      uses: actions/download-artifact@v4
      with:
        name: android-apk-release
        path: ./artifacts/android
    
    - name: Download iOS IPA (if available)
      uses: actions/download-artifact@v4
      continue-on-error: true
      with:
        name: ios-ipa
        path: ./artifacts/ios
    
    - name: Upload to App Center (Android)
      if: env.APPCENTER_API_TOKEN != ''
      env:
        APPCENTER_API_TOKEN: ${{ secrets.APPCENTER_API_TOKEN }}
      run: |
        if [ -n "$APPCENTER_API_TOKEN" ]; then
          npm install -g appcenter-cli
          appcenter login --token $APPCENTER_API_TOKEN
          appcenter distribute release --app digital-stokvel/DigitalStokvel-Android --file ./artifacts/android/*.apk --group "Internal Testers"
        else
          echo "::warning::App Center token not configured, skipping distribution"
        fi
    
    - name: Summary
      run: |
        echo "## 📦 Mobile Distribution" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "Mobile artifacts have been built and are ready for distribution." >> $GITHUB_STEP_SUMMARY
        echo "- Android APK: ✅" >> $GITHUB_STEP_SUMMARY
        echo "- iOS IPA: ${{ job.status == 'success' && '✅' || '⚠️ Not built (certificates required)' }}" >> $GITHUB_STEP_SUMMARY
        name: android-apk
        path: src/mobile/android/app/build/outputs/apk/release/*.apk

  build-ios:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: src/mobile/package-lock.json
    
    - name: Install dependencies
      run: npm ci
      working-directory: ./src/mobile
    
    - name: Install CocoaPods
      run: |
        cd ios
        pod install
      working-directory: ./src/mobile
    
    - name: Build iOS
      run: |
        cd ios
        xcodebuild -workspace DigitalStokvelMobile.xcworkspace \
          -scheme DigitalStokvelMobile \
          -configuration Release \
          -sdk iphoneos \
          CODE_SIGNING_ALLOWED=NO
      working-directory: ./src/mobile
