name: Full Stack Deployment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment for full deployment'
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
      skip_tests:
        description: 'Skip smoke tests after deployment'
        required: false
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy-infrastructure:
    name: Deploy Infrastructure
    uses: ./.github/workflows/infra-deploy.yml
    with:
      environment: ${{ inputs.environment }}
    secrets: inherit

  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    needs: deploy-infrastructure
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
    
    - name: Restore and build
      run: |
        dotnet restore
        dotnet build --no-restore --configuration Release
      working-directory: ./src/backend
    
    - name: Run tests
      run: dotnet test --no-build --configuration Release
      working-directory: ./src/backend
    
    - name: Log in to Azure Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ secrets.ACR_LOGIN_SERVER }}
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v6
      with:
        context: ./src/backend
        file: ./src/backend/DigitalStokvel.API/Dockerfile
        push: true
        tags: |
          ${{ secrets.ACR_LOGIN_SERVER }}/digitalstokvel-api:${{ github.sha }}
          ${{ secrets.ACR_LOGIN_SERVER }}/digitalstokvel-api:${{ inputs.environment }}-latest

  deploy-backend:
    name: Deploy Backend API
    runs-on: ubuntu-latest
    needs: [deploy-infrastructure, build-backend]
    environment: ${{ inputs.environment }}
    
    steps:
    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    
    - name: Deploy to Container Apps
      uses: azure/container-apps-deploy-action@v1
      with:
        containerAppName: digitalstokvel-api-${{ inputs.environment }}
        resourceGroup: digital-stokvel-${{ inputs.environment }}
        imageToDeploy: ${{ secrets.ACR_LOGIN_SERVER }}/digitalstokvel-api:${{ github.sha }}
        environmentVariables: |
          ASPNETCORE_ENVIRONMENT=${{ inputs.environment == 'dev' && 'Development' || 'Production' }}
          ApplicationInsights__ConnectionString=secretref:appinsights-connection-string

  build-web:
    name: Build Web Dashboard
    runs-on: ubuntu-latest
    needs: deploy-infrastructure
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: src/web/chairperson-dashboard/package-lock.json
    
    - name: Install dependencies
      run: npm ci
      working-directory: ./src/web/chairperson-dashboard
    
    - name: Build
      run: npm run build
      working-directory: ./src/web/chairperson-dashboard
      env:
        VITE_API_BASE_URL: ${{ needs.deploy-infrastructure.outputs.containerAppUrl }}
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: web-build
        path: src/web/chairperson-dashboard/dist

  deploy-web:
    name: Deploy Web Dashboard
    runs-on: ubuntu-latest
    needs: [deploy-infrastructure, build-web, deploy-backend]
    environment: ${{ inputs.environment }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: web-build
        path: ./dist
    
    - name: Deploy to Azure Static Web Apps
      uses: Azure/static-web-apps-deploy@v1
      with:
        azure_static_web_apps_api_token: ${{ inputs.environment == 'prod' && secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_PROD || secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_DEV }}
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        action: 'upload'
        app_location: './dist'
        skip_app_build: true

  smoke-tests:
    name: Run Smoke Tests
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-web]
    if: ${{ !inputs.skip_tests }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Wait for services to stabilize
      run: sleep 30
    
    - name: Backend health check
      run: |
        API_URL="${{ needs.deploy-infrastructure.outputs.containerAppUrl }}"
        echo "Testing API at: $API_URL/health"
        
        MAX_RETRIES=5
        RETRY_COUNT=0
        
        while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$API_URL/health")
          
          if [ $HTTP_STATUS -eq 200 ]; then
            echo "✅ Backend health check passed"
            break
          else
            echo "⚠️ Attempt $((RETRY_COUNT + 1))/$MAX_RETRIES: Health check returned $HTTP_STATUS"
            RETRY_COUNT=$((RETRY_COUNT + 1))
            sleep 10
          fi
        done
        
        if [ $RETRY_COUNT -eq $MAX_RETRIES ]; then
          echo "::error::Backend health check failed after $MAX_RETRIES attempts"
          exit 1
        fi
    
    - name: API integration test
      run: |
        API_URL="${{ needs.deploy-infrastructure.outputs.containerAppUrl }}"
        
        # Test API endpoint (adjust to actual endpoint)
        echo "Testing API endpoints..."
        
        # Test /api/health or /api/ping
        curl -f "$API_URL/api/health" || echo "::warning::API endpoint test failed"
    
    - name: Web dashboard check
      run: |
        WEB_URL="${{ secrets.WEB_APP_URL }}"
        if [ -n "$WEB_URL" ]; then
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$WEB_URL")
          if [ $HTTP_STATUS -eq 200 ]; then
            echo "✅ Web dashboard is accessible"
          else
            echo "::warning::Web dashboard returned status $HTTP_STATUS"
          fi
        else
          echo "::warning::Web URL not configured in secrets"
        fi

  deployment-summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [deploy-infrastructure, deploy-backend, deploy-web, smoke-tests]
    if: always()
    
    steps:
    - name: Generate deployment report
      run: |
        echo "## 🚀 Full Stack Deployment Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Environment: **${{ inputs.environment }}**" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Component | Status | Details |" >> $GITHUB_STEP_SUMMARY
        echo "|-----------|--------|---------|" >> $GITHUB_STEP_SUMMARY
        echo "| Infrastructure | ${{ needs.deploy-infrastructure.result == 'success' && '✅ Success' || '❌ Failed' }} | Resource Group: digital-stokvel-${{ inputs.environment }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Backend API | ${{ needs.deploy-backend.result == 'success' && '✅ Success' || '❌ Failed' }} | Image: digitalstokvel-api:${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Web Dashboard | ${{ needs.deploy-web.result == 'success' && '✅ Success' || '❌ Failed' }} | Static Web App |" >> $GITHUB_STEP_SUMMARY
        echo "| Smoke Tests | ${{ needs.smoke-tests.result == 'success' && '✅ Passed' || (needs.smoke-tests.result == 'skipped' && '⏭️ Skipped' || '❌ Failed') }} | Automated validation |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Deployment ID**: ${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
        echo "**Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
        echo "**Triggered by**: @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
    
    - name: Notify on failure
      if: failure()
      run: |
        echo "::error::Deployment to ${{ inputs.environment }} failed. Check logs for details."

  deploy-web:
    needs: deploy-infrastructure
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    - name: Build web dashboard
      run: |
        npm ci
        npm run build
      working-directory: ./src/web/chairperson-dashboard
      env:
        VITE_API_BASE_URL: ${{ secrets.API_BASE_URL }}
    
    - name: Deploy to Azure Static Web Apps
      uses: Azure/static-web-apps-deploy@v1
      with:
        azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        action: 'upload'
        app_location: './src/web/chairperson-dashboard'
        output_location: 'dist'
