name: Web CI/CD

on:
  push:
    branches: [ main ]
    paths:
      - 'src/web/**'
      - '.github/workflows/web-ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'src/web/**'

env:
  NODE_VERSION: '20'

jobs:
  lint-test-build:
    name: Lint, Test & Build
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: src/web/chairperson-dashboard/package-lock.json
    
    - name: Install dependencies
      run: npm ci
      working-directory: ./src/web/chairperson-dashboard
    
    - name: Run ESLint
      run: npm run lint
      working-directory: ./src/web/chairperson-dashboard
    
    - name: TypeScript type check
      run: npm run type-check || npx tsc --noEmit
      working-directory: ./src/web/chairperson-dashboard
      continue-on-error: false
    
    - name: Run tests with coverage
      run: npm test -- --coverage --run
      working-directory: ./src/web/chairperson-dashboard
      continue-on-error: true
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      if: always()
      with:
        files: ./src/web/chairperson-dashboard/coverage/lcov.info
        flags: web
        name: web-coverage
        fail_ci_if_error: false
    
    - name: Build production bundle
      run: npm run build
      working-directory: ./src/web/chairperson-dashboard
      env:
        VITE_API_BASE_URL: ${{ github.ref == 'refs/heads/main' && secrets.API_BASE_URL_PROD || secrets.API_BASE_URL_DEV }}
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: web-build
        path: src/web/chairperson-dashboard/dist
        retention-days: 7

  deploy-dev:
    name: Deploy to Development
    runs-on: ubuntu-latest
    needs: lint-test-build
    if: github.ref == 'refs/heads/main'
    environment:
      name: dev
      url: ${{ steps.deploy.outputs.static-web-app-url }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: web-build
        path: ./dist
    
    - name: Deploy to Azure Static Web Apps (Dev)
      id: deploy
      uses: Azure/static-web-apps-deploy@v1
      with:
        azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_DEV }}
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        action: 'upload'
        app_location: './dist'
        skip_app_build: true
        skip_api_build: true
    
    - name: Run smoke tests
      run: |
        echo "Waiting for deployment to stabilize..."
        sleep 20
        HEALTH_URL="${{ steps.deploy.outputs.static-web-app-url }}"
        HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" $HEALTH_URL)
        if [ $HTTP_STATUS -eq 200 ]; then
          echo "✅ Deployment verification passed"
        else
          echo "::warning::Deployment returned status $HTTP_STATUS"
        fi
    
    - name: Deployment summary
      run: |
        echo "## 🌐 Web Deployment - Development" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Environment**: Development" >> $GITHUB_STEP_SUMMARY
        echo "- **URL**: ${{ steps.deploy.outputs.static-web-app-url }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-dev
    if: github.ref == 'refs/heads/main'
    environment:
      name: prod
      url: ${{ steps.deploy.outputs.static-web-app-url }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: web-build
        path: ./dist
    
    - name: Deploy to Azure Static Web Apps (Prod)
      id: deploy
      uses: Azure/static-web-apps-deploy@v1
      with:
        azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_PROD }}
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        action: 'upload'
        app_location: './dist'
        skip_app_build: true
        skip_api_build: true
    
    - name: Run smoke tests
      run: |
        echo "Waiting for deployment to stabilize..."
        sleep 20
        HEALTH_URL="${{ steps.deploy.outputs.static-web-app-url }}"
        HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" $HEALTH_URL)
        if [ $HTTP_STATUS -eq 200 ]; then
          echo "✅ Deployment verification passed"
        else
          echo "::warning::Deployment returned status $HTTP_STATUS"
        fi
    
    - name: Deployment summary
      run: |
        echo "## 🌐 Web Deployment - Production" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Environment**: Production" >> $GITHUB_STEP_SUMMARY
        echo "- **URL**: ${{ steps.deploy.outputs.static-web-app-url }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
