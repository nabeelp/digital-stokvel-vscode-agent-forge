name: Infrastructure Deployment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
      skip_validation:
        description: 'Skip what-if validation'
        required: false
        type: boolean
        default: false
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
    secrets:
      AZURE_CREDENTIALS:
        required: true
      SQL_ADMIN_OBJECT_ID:
        required: false
  push:
    branches: [ main ]
    paths:
      - 'infra/**'
      - '.github/workflows/infra-deploy.yml'

permissions:
  id-token: write
  contents: read

jobs:
  validate:
    name: Validate Bicep Templates
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'push' || !inputs.skip_validation
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    
    - name: Install Bicep CLI
      run: az bicep install
    
    - name: Bicep lint
      run: |
        az bicep build --file main.bicep
        if [ $? -eq 0 ]; then
          echo "✅ Bicep syntax validation passed"
        else
          echo "::error::Bicep syntax validation failed"
          exit 1
        fi
      working-directory: ./infra
    
    - name: Bicep what-if analysis (Dev)
      if: inputs.environment == 'dev' || github.event_name == 'push'
      run: |
        az deployment group what-if \
          --resource-group digital-stokvel-dev \
          --template-file main.bicep \
          --parameters @parameters/dev.parameters.json \
          --parameters sqlAdminObjectId=${{ secrets.SQL_ADMIN_OBJECT_ID || 'placeholder' }}
      working-directory: ./infra
    
    - name: Bicep what-if analysis (Prod)
      if: inputs.environment == 'prod'
      run: |
        az deployment group what-if \
          --resource-group digital-stokvel-prod \
          --template-file main.bicep \
          --parameters @parameters/prod.parameters.json \
          --parameters sqlAdminObjectId=${{ secrets.SQL_ADMIN_OBJECT_ID || 'placeholder' }}
      working-directory: ./infra

  deploy:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    needs: validate
    if: always() && (needs.validate.result == 'success' || needs.validate.result == 'skipped')
    environment: ${{ inputs.environment || 'dev' }}
    outputs:
      containerAppUrl: ${{ steps.deployment.outputs.containerAppUrl }}
      postgresServerName: ${{ steps.deployment.outputs.postgresServerName }}
      keyVaultName: ${{ steps.deployment.outputs.keyVaultName }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    
    - name: Get current user
      id: current_user
      run: |
        USER_OID=$(az ad signed-in-user show --query id -o tsv)
        echo "user_oid=$USER_OID" >> $GITHUB_OUTPUT
    
    - name: Create resource group
      run: |
        ENV="${{ inputs.environment || 'dev' }}"
        LOCATION="southafricanorth"
        az group create \
          --name "digital-stokvel-$ENV" \
          --location "$LOCATION" \
          --tags Environment=$ENV Project=DigitalStokvel
    
    - name: Deploy Bicep template
      id: deployment
      uses: azure/arm-deploy@v2
      with:
        resourceGroupName: digital-stokvel-${{ inputs.environment || 'dev' }}
        template: ./infra/main.bicep
        parameters: >
          @./infra/parameters/${{ inputs.environment || 'dev' }}.parameters.json
          sqlAdminObjectId=${{ secrets.SQL_ADMIN_OBJECT_ID || steps.current_user.outputs.user_oid }}
        deploymentName: 'infra-${{ github.run_number }}'
        failOnStdErr: false
    
    - name: Get deployment outputs
      id: outputs
      run: |
        DEPLOYMENT_NAME="infra-${{ github.run_number }}"
        RG_NAME="digital-stokvel-${{ inputs.environment || 'dev' }}"
        
        CONTAINER_APP_URL=$(az deployment group show \
          --resource-group $RG_NAME \
          --name $DEPLOYMENT_NAME \
          --query properties.outputs.containerAppUrl.value -o tsv)
        
        POSTGRES_SERVER=$(az deployment group show \
          --resource-group $RG_NAME \
          --name $DEPLOYMENT_NAME \
          --query properties.outputs.postgresServerName.value -o tsv)
        
        KEYVAULT_NAME=$(az deployment group show \
          --resource-group $RG_NAME \
          --name $DEPLOYMENT_NAME \
          --query properties.outputs.keyVaultName.value -o tsv)
        
        echo "containerAppUrl=$CONTAINER_APP_URL" >> $GITHUB_OUTPUT
        echo "postgresServerName=$POSTGRES_SERVER" >> $GITHUB_OUTPUT
        echo "keyVaultName=$KEYVAULT_NAME" >> $GITHUB_OUTPUT
    
    - name: Configure Key Vault secrets
      if: steps.outputs.outputs.keyVaultName != ''
      run: |
        KEYVAULT_NAME="${{ steps.outputs.outputs.keyVaultName }}"
        
        # Store PostgreSQL connection string (placeholder - should be managed by infra)
        echo "Configuring Key Vault: $KEYVAULT_NAME"
        
        # Grant current user Key Vault access
        az keyvault set-policy \
          --name $KEYVAULT_NAME \
          --object-id ${{ steps.current_user.outputs.user_oid }} \
          --secret-permissions get list set
    
    - name: Deployment summary
      run: |
        echo "## 🏗️ Infrastructure Deployment" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Environment**: ${{ inputs.environment || 'dev' }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Resource Group**: digital-stokvel-${{ inputs.environment || 'dev' }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Container App URL**: ${{ steps.outputs.outputs.containerAppUrl }}" >> $GITHUB_STEP_SUMMARY
        echo "- **PostgreSQL Server**: ${{ steps.outputs.outputs.postgresServerName }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Key Vault**: ${{ steps.outputs.outputs.keyVaultName }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Deployment ID**: infra-${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY

  apply-migrations:
    name: Apply Database Migrations
    runs-on: ubuntu-latest
    needs: deploy
    if: success()
    environment: ${{ inputs.environment || 'dev' }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
    
    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    
    - name: Install EF Core tools
      run: dotnet tool install --global dotnet-ef
    
    - name: Run EF Core migrations
      run: |
        # Get connection string from Key Vault
        KEYVAULT_NAME="${{ needs.deploy.outputs.keyVaultName }}"
        CONNECTION_STRING=$(az keyvault secret show \
          --vault-name "$KEYVAULT_NAME" \
          --name "PostgresConnectionString" \
          --query value -o tsv) || echo "Connection string not in Key Vault"
        
        if [ -n "$CONNECTION_STRING" ]; then
          export ConnectionStrings__DefaultConnection="$CONNECTION_STRING"
          dotnet ef database update \
            --project src/backend/DigitalStokvel.Infrastructure \
            --startup-project src/backend/DigitalStokvel.API \
            --context StokvelDbContext
          
          echo "✅ Migrations applied successfully"
        else
          echo "::warning::Connection string not available, skipping migrations"
        fi
    
    - name: Verify migration
      run: |
        echo "## 🗄️ Database Migration" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Environment**: ${{ inputs.environment || 'dev' }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
